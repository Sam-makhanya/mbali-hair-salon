<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mbali Beauty Salon</title>

<style>
:root {
    --hot-pink: #ff3385;
    --light-pink: #ffe6f0;
    --soft-pink: #ff99c2;
    --white: #ffffff;
}

body {
    font-family: Arial, sans-serif;
    background-color: var(--light-pink);
    margin: 0;
}

/* AI BUTTON */
.ai-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--hot-pink);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    z-index: 3000;
}

/* AI BOX */
.ai-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    height: 400px;
    background: white;
    border-radius: 15px;
    display: none;
    flex-direction: column;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    z-index: 3000;
}

.ai-header {
    background: var(--hot-pink);
    color: white;
    padding: 10px;
    border-radius: 15px 15px 0 0;
    font-weight: bold;
}

.ai-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 14px;
}

.ai-input {
    display: flex;
    border-top: 1px solid #eee;
}

.ai-input input {
    flex: 1;
    padding: 10px;
    border: none;
}

.ai-input button {
    background: var(--hot-pink);
    color: white;
    border: none;
    padding: 10px;
}
</style>

</head>

<body>

<!-- ================= YOUR WEBSITE CONTENT STAYS EXACTLY THE SAME ================= -->

<button class="ai-button" onclick="toggleAI()">💬 Ask Mbali AI</button>

<div class="ai-box" id="aiBox">
    <div class="ai-header">Mbali AI Assistant</div>

    <div class="ai-messages" id="aiMessages">
        <p><b>AI:</b> Hi 👋 How can I help you today?</p>
    </div>

    <div class="ai-input">
        <input type="text" id="aiText" placeholder="Ask about prices, bookings...">
        <button onclick="sendAI()">Send</button>
    </div>
</div>

<!-- ================= FIREBASE (ADDED) ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE CONFIG (ADDED) ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBuXqC_tAsrRvui-TSWrnYyq1buhxtng6I",
  authDomain: "mbalisalon-3106b.firebaseapp.com",
  projectId: "mbalisalon-3106b",
  storageBucket: "mbalisalon-3106b.firebasestorage.app",
  messagingSenderId: "772199228866",
  appId: "1:772199228866:web:36bf0f91012c803c53e25b",
  measurementId: "G-NWQS1GVHHN"
};

/* ================= INITIALIZE FIREBASE (ADDED) ================= */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= AI CONFIG ================= */
const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY";

function toggleAI() {
    const box = document.getElementById("aiBox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

/* ================= AI SEND MESSAGE ================= */
async function sendAI() {
    const input = document.getElementById("aiText");
    const msg = input.value;
    if (!msg) return;

    addMessage("You", msg);
    input.value = "";

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
                {
                    role: "system",
                    content:
`You are Mbali Beauty Salon AI assistant. Help with prices, booking, hairstyles, location. Be short and professional.`
                },
                { role: "user", content: msg }
            ]
        })
    });

    const data = await response.json();
    const aiReply = data.choices?.[0]?.message?.content || "Sorry, I couldn't respond.";

    addMessage("AI", aiReply);
}

function addMessage(sender, text) {
    const box = document.getElementById("aiMessages");
    box.innerHTML += `<p><b>${sender}:</b> ${text}</p>`;
    box.scrollTop = box.scrollHeight;
}

/* ================= FIREBASE BOOKING SAVE (ADDED FIX) ================= */
async function saveBookingToFirebase(booking) {
    try {
        await db.collection("bookings").add(booking);
        console.log("Booking saved successfully");
    } catch (error) {
        console.error("Error saving booking:", error);
    }
}

/* ================= YOUR ORIGINAL FUNCTION (MODIFIED ONLY) ================= */
function confirmFinalBooking() {

    const name = document.getElementById("custName").value;
    const phone = document.getElementById("custPhone").value;
    const date = document.getElementById("bookDate").value;
    const time = document.getElementById("bookTime").value;

    if (!name || !phone || !date || !time) {
        alert("Please fill all details!");
        return;
    }

    const ref = "MB-" + Math.floor(1000 + Math.random() * 9000);

    const bookingData = {
        reference: ref,
        name,
        phone,
        date,
        time,
        createdAt: new Date()
    };

    /* ✅ SAVE TO FIREBASE */
    saveBookingToFirebase(bookingData);

    /* YOUR EXISTING WHATSAPP LOGIC (KEEP AS YOU HAD IT) */
    let message = `Booking Ref: ${ref} Name: ${name} Phone: ${phone} Date: ${date} Time: ${time}`;

    window.open(`https://wa.me/27794704299?text=${message}`, '_blank');
}

</script>

</body>
</html>
